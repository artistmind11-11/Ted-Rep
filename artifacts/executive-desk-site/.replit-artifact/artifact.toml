kind = "web"
previewPath = "/"
title = "The Executive Desk"
version = "1.0.0"
id = "artifacts/executive-desk-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22768

[services.development]
run = "pnpm --filter @workspace/executive-desk-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/executive-desk-site", "run", "build" ]
publicDir = "artifacts/executive-desk-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22768"
BASE_PATH = "/"
